<html>
<head>
    <title>Checklist Flexo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .checklist {
            margin: 20px;
        }
        .section {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="checklist">
        <h1>Checklist Flexo</h1>
        <div class="section">
            <h2>Section 1</h2>
            <input type="checkbox" id="item1"><label for="item1">Item 1</label><br>
            <input type="checkbox" id="item2"><label for="item2">Item 2</label><br>
        </div>
        <div class="section">
            <h2>Section 2</h2>
            <input type="checkbox" id="item3"><label for="item3">Item 3</label><br>
            <input type="checkbox" id="item4"><label for="item4">Item 4</label><br>
        </div>
        <button id="submit">Submit</button>
    </div>
    <script>
        document.getElementById('submit').onclick = function() {
            alert('Checklist submitted!');
        };
    </script>
</body>
</html>
