<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Flexo</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Checklist Flexo</h1>
    </header>
    <main>
        <form id="checklistForm">
            <section>
                <h2>Section 1</h2>
                <label for="item1">Item 1:</label>
                <input type="checkbox" id="item1" name="item1">
                <label for="item2">Item 2:</label>
                <input type="checkbox" id="item2" name="item2">
            </section>
            <section>
                <h2>Section 2</h2>
                <label for="item3">Item 3:</label>
                <input type="checkbox" id="item3" name="item3">
                <label for="item4">Item 4:</label>
                <input type="checkbox" id="item4" name="item4">
            </section>
            <button type="submit">Submit</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Checklist Flexo. All rights reserved.</p>
    </footer>
</body>
</html>
